[database]
uri = "bolt://127.0.0.1:7687/memgraph"
user = ""
password = ""
database = "memgraph"
max_connections = 16
query_timeout_secs = 60

[ingest]
# Rows per embedding-insert query. Keeps each `libqlink.insert_hybrid` batch
# small enough to finish under `query_timeout_secs` on large (>50k) ingests.
embedding_insert_batch_size = 500

[llm]
provider = "openai"
base_url = "http://79.117.32.66:50715/v1"
model = "vllm-qwen36"
temperature = 0.0
max_tokens = 2048

[qdrant]
# Direct Qdrant endpoint for ontology/entity embedding storage + server-side
# similarity search used by query-driven prompt generation. Leave `url` empty
# to fall back to an in-process embedding store.
url = "http://127.0.0.1:6333"
#api_key_env = "QDRANT_API_KEY"
timeout_secs = 30
collection = "linguagraph_ontology"

[graph_specification]
embedding_model = "/home/df/.cache/huggingface/hub/models--gpustack--bge-m3-GGUF/snapshots/2d48f1737679ad900d5c26c5aad5410e9c70fdca/bge-m3-Q4_K_M.gguf"
reranking_model = "/home/df/.cache/huggingface/hub/models--gpustack--bge-reranker-v2-m3-GGUF/snapshots/3093af03b1a635e67b084b1d8c03c5f5e020fd05/bge-reranker-v2-m3-Q4_K_M.gguf"
embedding_dim = 1024
reranking_threshold = 0.3

[types.SemanticText]
embedding_model = "/home/df/.cache/huggingface/hub/models--gpustack--bge-m3-GGUF/snapshots/2d48f1737679ad900d5c26c5aad5410e9c70fdca/bge-m3-Q4_K_M.gguf"
# Cross-encoder used to rerank grounding candidates for `cardinality: "one"`
# (a single named entity). Without this the reranker is not attached and the
# "one" pin falls back to the RRF fusion order.
reranking_model = "/home/df/.cache/huggingface/hub/models--gpustack--bge-reranker-v2-m3-GGUF/snapshots/3093af03b1a635e67b084b1d8c03c5f5e020fd05/bge-reranker-v2-m3-Q4_K_M.gguf"
collection = "linguagraph_e2e"
top_k = 20
threshold = 0.35
reranker_threshold = 0.2
embedding_dim = 1024

[query]
max_traversal_depth = 6
default_limit = 50
# Safety ceiling on rows a compiled DSL read query may return. A query that
# omits `limit` returns every matching row up to this cap (rather than being
# truncated to a small default); an explicit `limit` is also capped here.
max_limit = 5000

# Query-time grounding (entity linking). When enabled, a SemanticText
# filter whose cardinality resolves to "one" is first resolved directly
# against the `_canonical` collection in Qdrant (reusing the query
# embedding); a high-confidence, same-label hit is pinned by node id in
# the generated Cypher instead of running the server-side
# `libqlink.search_hybrid_reranked`. Anything below the bar, or a "many"
# filter, falls back to that search unchanged. Requires the [qdrant]
# endpoint to hold the qlink-populated `_canonical` points. Off by default.
[query.grounding]
enabled = true
threshold = 0.65   # min score to pin (rerank score when rerank = true, else cosine)
fetch_k = 20      # candidates fetched from Qdrant before label-filter + threshold
rerank = true    # rerank candidates with the SemanticText cross-encoder first
