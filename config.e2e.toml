[database]
uri = "bolt://127.0.0.1:7687/memgraph"
user = ""
password = ""
database = "memgraph"
max_connections = 16
query_timeout_secs = 60

[ingest]
# Rows per embedding-insert query. Keeps each `libqlink.insert_hybrid` batch
# small enough to finish under `query_timeout_secs` on large (>50k) ingests.
embedding_insert_batch_size = 500

[llm]
provider = "openai"
base_url = "http://79.117.32.66:50715/v1"
model = "vllm-qwen36"
temperature = 0.0
max_tokens = 2048

[graph_specification]
embedding_model = "/home/df/.cache/huggingface/hub/models--gpustack--bge-m3-GGUF/snapshots/2d48f1737679ad900d5c26c5aad5410e9c70fdca/bge-m3-Q4_K_M.gguf"
reranking_model = "/home/df/.cache/huggingface/hub/models--gpustack--bge-reranker-v2-m3-GGUF/snapshots/3093af03b1a635e67b084b1d8c03c5f5e020fd05/bge-reranker-v2-m3-Q4_K_M.gguf"
embedding_dim = 1024
reranking_threshold = 0.3

[types.SemanticText]
embedding_model = "/home/df/.cache/huggingface/hub/models--gpustack--bge-m3-GGUF/snapshots/2d48f1737679ad900d5c26c5aad5410e9c70fdca/bge-m3-Q4_K_M.gguf"
